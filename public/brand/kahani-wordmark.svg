<?xml version="1.0" encoding="UTF-8"?>
<!-- Wordmark only — no tagline, no ornaments. Use at very small sizes or when context makes the cuisine clear. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 72" width="400" height="72" role="img" aria-label="Kahani">
  <title>Kahani — Wordmark</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&amp;display=swap');
      .wordmark { font-family: 'Playfair Display', Georgia, 'Times New Roman', serif; }
    </style>
  </defs>

  <!-- Transparent background — maroon letterforms, place on any light surface -->
  <text class="wordmark" x="206" y="62"
    font-size="60" font-weight="700" fill="#1E0808"
    text-anchor="middle" letter-spacing="12">KAHANI</text>
</svg>
